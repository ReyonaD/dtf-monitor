<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DTF Production Status</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
<style>
  * { margin:0; padding:0; box-sizing:border-box; }
  body {
    font-family: 'Inter', sans-serif;
    background: #0a0a0f;
    color: #e2e2e8;
    display: flex;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
  }
  .landing {
    text-align: center;
    max-width: 480px;
    padding: 20px;
  }
  .logo-mark {
    width: 64px; height: 64px;
    background: linear-gradient(135deg, #a78bfa, #7c3aed);
    border-radius: 16px;
    display: flex; align-items: center; justify-content: center;
    font-weight: 900; font-size: 28px; color: #fff;
    margin: 0 auto 24px;
  }
  .title {
    font-size: 28px; font-weight: 800; margin-bottom: 8px;
  }
  .subtitle {
    font-size: 14px; color: #6b6b80; margin-bottom: 48px;
  }
  .cards {
    display: flex; gap: 20px;
  }
  .card {
    flex: 1;
    background: #12121a;
    border: 1px solid rgba(255,255,255,0.06);
    border-radius: 16px;
    padding: 36px 24px;
    cursor: pointer;
    transition: border-color 0.2s, transform 0.2s, background 0.2s;
    text-decoration: none;
    color: inherit;
    display: block;
  }
  .card:hover {
    border-color: #7c3aed;
    transform: translateY(-4px);
    background: #16161f;
  }
  .card-icon {
    width: 48px; height: 48px;
    border-radius: 12px;
    display: flex; align-items: center; justify-content: center;
    margin: 0 auto 16px;
  }
  .card-icon.admin {
    background: rgba(232,255,71,0.1);
    color: #E8FF47;
  }
  .card-icon.customer {
    background: rgba(74,158,255,0.1);
    color: #4A9EFF;
  }
  .card-title {
    font-size: 18px; font-weight: 700; margin-bottom: 8px;
  }
  .card-desc {
    font-size: 13px; color: #6b6b80; line-height: 1.5;
  }
  @media (max-width: 500px) {
    .cards { flex-direction: column; }
  }
</style>
</head>
<body>
<div class="landing">
  <div class="logo-mark">D</div>
  <div class="title">DTF Production Status</div>
  <div class="subtitle">Select your portal to continue</div>
  <div class="cards">
    <a href="/admin" class="card">
      <div class="card-icon admin">
        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z"/></svg>
      </div>
      <div class="card-title">Admin</div>
      <div class="card-desc">Dashboard, machine monitoring & management</div>
    </a>
    <a href="/customer" class="card">
      <div class="card-icon customer">
        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20 21v-2a4 4 0 00-4-4H8a4 4 0 00-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
      </div>
      <div class="card-title">Customer</div>
      <div class="card-desc">Upload files, track orders & view credits</div>
    </a>
  </div>
</div>
</body>
</html>
